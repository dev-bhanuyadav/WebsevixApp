# Nginx — android.websevix.com (Next.js on port 3000)
# Use: sudo cp nginx.android.websevix.com.conf /etc/nginx/sites-available/android.websevix.com
#      sudo ln -sf /etc/nginx/sites-available/android.websevix.com /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
# Then: sudo certbot --nginx -d android.websevix.com

# HTTP (Certbot ke liye .well-known allow karo)
server {
    listen 80;
    listen [::]:80;
    server_name android.websevix.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript text/xml application/xml image/svg+xml font/woff2;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# HTTPS — Certbot run karne ke baad ye block add ho jata hai (certbot --nginx).
